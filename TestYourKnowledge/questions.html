            <div class="question-item">
                <div class="question-text">1. What is the chemical symbol for Gold?</div>
                <ul class="answers-list">
                    <li class="answer-box">A: Ag</li>
                    <li class="answer-box correct">B: Au</li>
                    <li class="answer-box">C: Fe</li>
                    <li class="answer-box">D: Gd</li>
                </ul>
            </div>

            <div class="question-item">
                <div class="question-text">2. Who painted the Mona Lisa?</div>
                <ul class="answers-list">
                    <li class="answer-box">A: Vincent van Gogh</li>
                    <li class="answer-box">B: Pablo Picasso</li>
                    <li class="answer-box">C: Michelangelo</li>
                    <li class="answer-box correct">D: Leonardo da Vinci</li>
                </ul>
            </div>

        </div>
