<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Your Knowledge - User Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Test Your Knowledge</h1>
        <nav aria-label="Main navigation">
            <div class="dropdown">
                <button class="dropbtn" aria-haspopup="true">Menu v</button>
                <div class="dropdown-content">
                    <a href="index.html">Home</a>
                    <a href="user-panel.html">User Panel</a>
                    <a href="questions.html">Questions List</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="panel-main">
        <div class="profile-header">
            <div class="avatar" aria-hidden="true">P</div>
            <div class="profile-info">
                <h2>Player One</h2>
                <p>Rank: New Player</p>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <h3>Games Played</h3>
                <p>0</p>
            </div>
            <div class="stat-card">
                <h3>Questions Answered</h3>
                <p>0</p>
            </div>
            <div class="stat-card">
                <h3>Correct Answers</h3>
                <p>0%</p>
            </div>
            <div class="stat-card">
                <h3>Best Prize</h3>
                <p>$0</p>
            </div>
            <div class="stat-card">
                <h3>Total Prize</h3>
                <p>$0</p>
            </div>
        </div>

        <div class="panel-actions">
            <button id="reset-stats-btn" class="walk-away-btn reset-stats-btn">Reset stats</button>
        </div>

        <div class="history-section">
            <h3>Recent Games History</h3>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Questions Reached</th>
                        <th>Prize Won</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="empty-history-row">
                        <td colspan="3">No games saved yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/player-stats.js"></script>
    <script src="js/user-panel-page.js"></script>
</body>
</html>
