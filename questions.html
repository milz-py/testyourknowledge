<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Your Knowledge - Questions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Test Your Knowledge</h1>
        <nav aria-label="Main navigation">
            <div class="dropdown">
                <button class="dropbtn" aria-haspopup="true">Menu v</button>
                <div class="dropdown-content">
                    <a href="index.html">Home</a>
                    <a href="user-panel.html">User Panel</a>
                    <a href="questions.html">Questions List</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="questions-main">
        <div class="questions-container">
            <h2>Question Database</h2>

            <form id="questions-form" class="filters-bar">
                <label class="sr-only" for="amount">Number of questions</label>
                <select id="amount" class="filter-select" name="amount" required>
                    <option value="5">5 questions</option>
                    <option value="10" selected>10 questions</option>
                    <option value="15">15 questions</option>
                </select>

                <label class="sr-only" for="category">Category</label>
                <select id="category" class="filter-select" name="category">
                    <option value="">Any Category</option>
                    <option value="9">General Knowledge</option>
                    <option value="17">Science & Nature</option>
                    <option value="18">Science: Computers</option>
                    <option value="21">Sports</option>
                    <option value="23">History</option>
                </select>

                <label class="sr-only" for="difficulty">Difficulty</label>
                <select id="difficulty" class="filter-select" name="difficulty">
                    <option value="">Any Difficulty</option>
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>

                <label class="sr-only" for="sort">Sort questions</label>
                <select id="sort" class="filter-select" name="sort">
                    <option value="default">Default order</option>
                    <option value="difficulty-asc">Difficulty: Easy to Hard</option>
                    <option value="difficulty-desc">Difficulty: Hard to Easy</option>
                    <option value="category-asc">Category A-Z</option>
                    <option value="question-asc">Question A-Z</option>
                </select>

                <button type="submit" class="page-btn">Load questions</button>
            </form>

            <label class="sr-only" for="search-input">Search loaded questions</label>
            <input
                type="text"
                id="search-input"
                class="search-input questions-search"
                placeholder="Search loaded questions..."
            >

            <p id="questions-status" class="questions-status" aria-live="polite">Choose filters and load questions.</p>

            <div id="questions-list" class="questions-list" aria-live="polite"></div>
        </div>
    </main>

    <script src="js/questions-data.js"></script>
    <script src="js/questions-service.js"></script>
    <script src="js/questions-view.js"></script>
    <script src="js/questions-page.js"></script>
</body>
</html>
